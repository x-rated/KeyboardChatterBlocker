name: Build Chat-Blocker

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: AMD64
            msvc_arch: amd64
            artifact: KbChatterBlocker-AMD64.exe
          - arch: ARM64
            msvc_arch: amd64_arm64
            artifact: KbChatterBlocker-ARM64.exe

    runs-on: windows-latest
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build EXE
        shell: cmd
        run: |
          cl.exe /O1 /EHsc /W3 /MD /std:c++20 ^
            /DUNICODE /D_UNICODE ^
            /Fe:${{ matrix.artifact }} ^
            KbChatterBlocker.cpp ^
            user32.lib kernel32.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
